<div class="profile-modal-overlay" *ngIf="showProfileModal">
  <div class="profile-modal-card">
    <div class="profile-modal-header">
      <h3>User Profile</h3>
      <button class="close-modal-btn" (click)="closeProfileModal()">×</button>
    </div>
    
    <div class="profile-modal-body">
      <div class="profile-avatar-wrapper">
        <div class="profile-avatar-circle">
          {{ (userEmail ? userEmail.charAt(0).toUpperCase() : ' ') }}
        </div>
      </div>
      
      <div class="profile-info-grid">
        <div class="info-row">
          <span class="info-label">Linked Account ID:</span>
          <span class="info-value">#{{ currentAccountId || 'N/A' }}</span>
        </div>
        <div class="info-row">
          <span class="info-label">User Email:</span>
          <span class="info-value email-value">{{ userEmail || 'virat.kohali@gmail.com' }}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Security Protocol:</span>
          <span class="info-value text-success" style="color: #10b981; font-weight: 700;">● ACTIVE ACCOUNT</span>
        </div>
      </div>
    </div>

    <div class="profile-modal-footer">
      <button class="profile-done-btn" (click)="closeProfileModal()">Done</button>
    </div>
  </div>
</div>
