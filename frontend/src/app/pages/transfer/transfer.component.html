<app-sidebar></app-sidebar>

<div class="main-content">
    <div class="transfer-box">
        <h2 style="margin-top: 0; color: #1e3a8a; text-align: center;">Fund Transfer</h2>
        
        <form (ngSubmit)="transferMoney()">
            
            <label style="font-weight: bold; color: #4b5563; font-size: 14px;">Source Account ID (Your Account)</label>
            <input
              type="number"
              [value]="transferData.senderAccountId"
              readonly
              disabled
              style="background-color: #e5e7eb; cursor: not-allowed;"
              placeholder="Sender Account ID">

            <label style="font-weight: bold; color: #4b5563; font-size: 14px;">Recipient Account ID</label>
            <input
              type="number"
              placeholder="Enter Receiver Account ID"
              [(ngModel)]="transferData.receiverAccountId"
              name="receiverAccountId"
              required>

            <label style="font-weight: bold; color: #4b5563; font-size: 14px;">Transfer Amount (₹)</label>
            <input
              type="number"
              placeholder="Enter Amount to Send"
              [(ngModel)]="transferData.amount"
              name="amount"
              required>

            <button type="submit" style="margin-top: 15px;">
              Send Money
            </button>
            
        </form>
    </div>
</div>
